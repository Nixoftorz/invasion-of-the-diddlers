SCREEN_WIDTH = 800

screen = pygame.display.set_mode((SCREEN_WIDTH, SCREEN_HEIGHT))

# --- Colors ---
WHITE = (255, 255, 255)
BLACK = (0, 0, 0)

BLUE = (0, 0, 255)

# --- Player Class ---
class Player(pygame.sprite.Sprite):
    def __init__(self):
        super().__init__()
        self.image = pygame.Surface([30, 50])
        self.image.fill(BLUE)
        self.rect = self.image.get_rect()
        self.rect.center = (SCREEN_WIDTH // 4, SCREEN_HEIGHT - 50)
        self.change_x = 0
        self.change_y = 0
        self.on_ground = True # For basic jumping
        self.direction = 1 # 1 for right, -1 for left

    def update(self):
        # Basic horizontal movement
        self.rect.x += self.change_x

        # Update player direction
        if self.change_x > 0:
            self.direction = 1
        elif self.change_x < 0:
            self.direction = -1

        # Basic vertical movement (gravity and jump)
        if not self.on_ground:
            self.change_y += 0.35 # Gravity
        self.rect.y += self.change_y

        # Keep player within screen bounds
        if self.rect.left < 0:
            self.rect.left = 0
        if self.rect.right > SCREEN_WIDTH:
            self.rect.right = SCREEN_WIDTH

        # Simulate ground for now
        if self.rect.bottom >= SCREEN_HEIGHT - 10: # Simple ground level
            self.rect.bottom = SCREEN_HEIGHT - 10
            self.change_y = 0
            self.on_ground = True

    def jump(self):
        if self.on_ground:
            self.change_y = -10 # Jump strength
            self.on_ground = False

    def go_left(self):
        self.change_x = -5

    def go_right(self):
        self.change_x = 5

    def stop(self):
        self.change_x = 0

            print(f"Error: Enemy image not found at {image_path}")
            pygame.quit()
            exit()

        original_image = pygame.image.load(image_path).convert_alpha()
        self.image = pygame.transform.scale(original_image, (40, 40)) # Scale image
        self.rect = self.image.get_rect()

        self.speed = speed
        self.player_rect = player_rect
        self.spawn_side = random.choice(['left', 'right'])

        if self.spawn_side == 'left':
            self.rect.x = -self.rect.width
        else:
            self.rect.x = SCREEN_WIDTH

        self.rect.y = random.randint(SCREEN_HEIGHT // 2, SCREEN_HEIGHT - 50 - self.rect.height) # Spawn above ground

    def update(self):
        # Simple pathfinding: chase the player (basic horizontal movement towards player)
        if self.player_rect.x < self.rect.x:
            self.rect.x -= self.speed
        elif self.player_rect.x > self.rect.x:
            self.rect.x += self.speed

        # Enemies despawn when far off-screen
        if self.rect.x < -100 or self.rect.x > SCREEN_WIDTH + 100:
            self.kill()

# --- Bullet Class ---
class Bullet(pygame.sprite.Sprite):
    def __init__(self, x, y, direction):
        super().__init__()
        self.image = pygame.Surface([10, 5])
        self.image.fill(RED)
        self.rect = self.image.get_rect()
        self.rect.center = (x, y)
        self.speed = 10 * direction # Bullet speed depends on direction

    def update(self):
        self.rect.x += self.speed
        if self.rect.left > SCREEN_WIDTH or self.rect.right < 0:
            self.kill()
